<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Smart Task Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h2 class="logo">panze</h2>
    <nav>
      <button class="active">🏠</button>
      <button>📋</button>
      <button>📊</button>
      <button>⚙️</button>
    </nav>
  </aside>

  <!-- Main -->
  <main class="main">

    <!-- Topbar -->
    <header class="topbar">
      <div>
        <p class="subtitle">Manage and track your projects</p>
        <h1>Project Dashboard</h1>
      </div>

      <div class="top-actions">
        <div class="tabs">
          <button>Today</button>
          <button>This Week</button>
          <button class="active">This Month</button>
        </div>

        <input id="search" placeholder="Search tasks..." />
      </div>
    </header>

    <!-- Dashboard -->
    <section class="dashboard">

      <!-- Tasks -->
      <section class="card tasks">
        <div class="card-header">
          <h3>My Tasks</h3>
          <button id="addTask">+</button>
        </div>

        <div id="taskList"></div>
      </section>

      <!-- Charts -->
      <section class="card">
        <h3>Projects Overview</h3>
        <canvas id="projectChart"></canvas>
      </section>

      <section class="card">
        <h3>Income vs Expense</h3>
        <canvas id="incomeChart"></canvas>
      </section>

      <!-- Invoice -->
      <section class="card">
        <h3>Invoice Overview</h3>
        <p id="invoiceData">No data</p>
      </section>

    </section>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
